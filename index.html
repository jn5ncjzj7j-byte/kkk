<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bullet Storm</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&display=swap');
    * { font-family: 'Noto Sans Thai', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
    body { overflow: hidden; background: #0a0a0f; margin: 0; padding: 0; box-sizing: border-box; }
    #gameCanvas { display: block; touch-action: none; position: absolute; inset: 0; }
    .glow-text { text-shadow: 0 0 10px #ff6b9d, 0 0 20px #ff6b9d, 0 0 30px #ff6b9d; }
    .glow-blue { text-shadow: 0 0 10px #6bffff, 0 0 20px #6bffff; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse-anim { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .control-hint { background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
  </style>
 </head>
 <body class="h-full">

  <div id="startScreen" class="fixed inset-0 flex flex-col items-center justify-center z-20" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 50%, #0a1a2a 100%);">
   <div class="text-center w-full flex flex-col items-center justify-center px-4">
    <h1 id="gameTitle" class="text-5xl md:text-7xl font-black text-pink-400 glow-text mb-4 float-anim">✧ BULLET STORM ✧</h1>
    <p class="text-cyan-300 text-lg md:text-xl mb-12 glow-blue">弾幕シューティング</p>
    <div class="control-hint rounded-xl p-6 mb-8 max-w-md w-full">
     <p class="text-white font-bold mb-4 text-lg">🎮 วิธีเล่น</p>
     <div class="text-gray-300 text-sm space-y-3">
      <p>💻 <span class="text-cyan-400">WASD</span> - เคลื่อนที่ | <span class="text-pink-400">SHIFT</span> - โหมดช้า</p>
      <p>📱 <span class="text-cyan-400">ลากนิ้ว</span> - เคลื่อนที่ | <span class="text-pink-400">2 นิ้ว</span> - โหมดช้า</p>
      <p>🛠️ <span class="text-yellow-400 font-bold">Right Ctrl</span> - Admin Panel</p>
     </div>
    </div>
    <button id="startBtn" class="px-12 py-4 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold text-xl rounded-full transform hover:scale-105 transition-all shadow-lg pulse-anim"> 🚀 เริ่มเกม </button>
   </div>
  </div>

  <div id="leaderboardOverlay" class="fixed inset-0 hidden flex-col items-center justify-center z-30 bg-black/95 px-4">
    <h2 class="text-4xl font-black text-cyan-400 mb-6 glow-blue">TOP PILOTS</h2>
    <div id="leaderboardList" class="w-full max-w-xs space-y-2 mb-8"></div>
    <button onclick="location.reload()" class="px-10 py-3 bg-pink-600 text-white font-bold rounded-full hover:bg-pink-500">🔄 เล่นอีกครั้ง</button>
  </div>

  <div id="adminPanel" class="fixed top-4 left-4 w-56 hidden flex-col z-50 bg-gray-900 border border-pink-500 rounded-lg shadow-2xl overflow-hidden select-none">
    <div id="adminHeader" class="bg-pink-600 p-2 text-white text-[10px] font-bold flex justify-between cursor-move">
        <span>ADMIN CONSOLE</span>
        <span class="opacity-70">DRAG ME</span>
    </div>
    <div class="p-3 space-y-3">
        <button id="godModeBtn" class="w-full py-2 bg-red-900 text-white text-xs font-bold rounded">GOD MODE: OFF</button>
        <button onclick="localStorage.clear(); location.reload();" class="w-full py-1 text-gray-500 text-[10px] hover:text-red-400">WIPE ALL DATA</button>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="hud" class="absolute top-0 left-0 right-0 p-3 hidden z-10 pointer-events-none">
   <div class="flex justify-between items-start max-w-2xl mx-auto">
    <div class="control-hint rounded-lg px-4 py-2"><p class="text-pink-400 font-bold text-sm">SCORE</p><p id="scoreDisplay" class="text-white text-xl font-bold">0</p></div>
    <div class="control-hint rounded-lg px-4 py-2 text-center"><p class="text-cyan-400 font-bold text-sm">WAVE</p><p id="waveDisplay" class="text-white text-xl font-bold">1</p></div>
    <div class="control-hint rounded-lg px-4 py-2"><p class="text-red-400 font-bold text-sm">LIVES</p><p id="livesDisplay" class="text-white text-xl font-bold">❤️❤️❤️</p></div>
   </div>
   <div id="slowModeBar" class="max-w-2xl mx-auto mt-2 hidden">
    <div class="control-hint rounded-lg px-3 py-1 flex items-center gap-2">
      <span class="text-blue-400 text-xs font-bold">SLOW</span>
      <div class="flex-1 h-2 bg-gray-700 rounded-full overflow-hidden">
        <div id="slowModeTimerFill" class="h-full bg-cyan-400" style="width: 100%"></div>
      </div>
    </div>
   </div>
  </div>

  <script>
    // --- AUDIO SYSTEM ---
    const Sound = {
        ctx: null,
        init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(f, t, d, v) {
            if(!this.ctx) return;
            const o = this.ctx.createOscillator(), g = this.ctx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + d);
            o.connect(g); g.connect(this.ctx.destination);
            o.start(); o.stop(this.ctx.currentTime + d);
        }
    };

    // --- LEADERBOARD (No Duplicate Names) ---
    function handleScore(finalScore) {
        let name = localStorage.getItem('bs_name');
        if (!name) {
            name = prompt("ยินดีด้วย! ใส่ชื่อของคุณ:", "PILOT") || "Unknown";
            localStorage.setItem('bs_name', name);
        }
        let scores = JSON.parse(localStorage.getItem('bs_scores')) || [];
        const exist = scores.findIndex(e => e.name === name);
        if (exist !== -1) {
            if (finalScore > scores[exist].score) scores[exist].score = finalScore;
        } else {
            scores.push({name, score: finalScore});
        }
        scores.sort((a,b) => b.score - a.score);
        localStorage.setItem('bs_scores', JSON.stringify(scores.slice(0, 5)));
        renderLeaderboard(scores.slice(0, 5));
    }
    function renderLeaderboard(scores) {
        document.getElementById('leaderboardList').innerHTML = scores.map((s, i) => `
            <div class="flex justify-between bg-gray-800/50 p-3 rounded border-l-4 ${i===0?'border-yellow-400':'border-cyan-400'}">
                <span class="text-white font-bold">${i+1}. ${s.name}</span>
                <span class="text-cyan-300 font-bold">${s.score.toLocaleString()}</span>
            </div>
        `).join('');
        document.getElementById('leaderboardOverlay').classList.remove('hidden');
    }

    // --- ADMIN DRAG ---
    const ap = document.getElementById('adminPanel'), ah = document.getElementById('adminHeader');
    let isDrag = false, dx, dy;
    ah.onmousedown = (e) => { isDrag = true; dx = e.clientX - ap.offsetLeft; dy = e.clientY - ap.offsetTop; };
    document.onmousemove = (e) => { if(isDrag) { ap.style.left = (e.clientX-dx)+'px'; ap.style.top = (e.clientY-dy)+'px'; } };
    document.onmouseup = () => isDrag = false;
    document.addEventListener('keydown', (e) => { if(e.code === 'ControlRight') ap.classList.toggle('hidden'); });

    // --- GAME ENGINE (YOUR ORIGINAL CODE) ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameState = 'menu', score = 0, lives = 3, wave = 1, isGodMode = false;
    let slowModeActive = false, slowTimer = 5000;

    const player = { x: 0, y: 0, vx: 0, vy: 0, radius: 12, speed: 8, bullets: [], lastFire: 0 };
    let enemies = [], enemyBullets = [], particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    // Input Handling
    const keys = {};
    window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key === 'Shift') slowModeActive = true; };
    window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; if(e.key === 'Shift') slowModeActive = false; };

    function spawnEnemy() {
        if(gameState !== 'playing') return;
        enemies.push({ x: Math.random()*canvas.width, y: -20, speed: 2 + (wave*0.2), hp: 1 });
        setTimeout(spawnEnemy, 1500 / (1 + wave * 0.1));
    }

    document.getElementById('startBtn').onclick = () => {
        Sound.init();
        gameState = 'playing';
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        player.x = canvas.width/2; player.y = canvas.height*0.8;
        spawnEnemy();
        update();
    };

    document.getElementById('godModeBtn').onclick = function() {
        isGodMode = !isGodMode;
        this.textContent = isGodMode ? "GOD MODE: ON" : "GOD MODE: OFF";
        this.className = isGodMode ? "w-full py-2 bg-green-600 text-white text-xs font-bold rounded" : "w-full py-2 bg-red-900 text-white text-xs font-bold rounded";
    };

    function update() {
        if (gameState !== 'playing') return;
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Slow Mode Logic
        if (slowModeActive && slowTimer > 0) {
            slowTimer -= 16;
            document.getElementById('slowModeBar').classList.remove('hidden');
        } else {
            slowModeActive = false;
            if (slowTimer < 5000) slowTimer += 5;
            if (slowTimer >= 5000) document.getElementById('slowModeBar').classList.add('hidden');
        }
        document.getElementById('slowModeTimerFill').style.width = (slowTimer/5000*100)+'%';

        const spd = slowModeActive ? player.speed * 0.5 : player.speed;

        // Player Movement
        if (keys['w']) player.vy -= 1.2; if (keys['s']) player.vy += 1.2;
        if (keys['a']) player.vx -= 1.2; if (keys['d']) player.vx += 1.2;
        player.vx *= 0.85; player.vy *= 0.85;
        player.x += player.vx * (spd/8); player.y += player.vy * (spd/8);
        player.x = Math.max(player.radius, Math.min(canvas.width-player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(canvas.height-player.radius, player.y));

        // Draw Player
        ctx.fillStyle = '#ff6b9d';
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff6b9d';
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Auto Fire
        if (Date.now() - player.lastFire > 120) {
            player.bullets.push({ x: player.x, y: player.y - 15 });
            Sound.play(800, 'square', 0.06, 0.02);
            player.lastFire = Date.now();
        }

        // Bullets
        player.bullets.forEach((b, i) => {
            b.y -= 12;
            ctx.fillStyle = '#6bffff';
            ctx.fillRect(b.x-2, b.y, 4, 12);
            if(b.y < -20) player.bullets.splice(i, 1);
        });

        // Enemies
        enemies.forEach((e, ei) => {
            e.y += slowModeActive ? e.speed * 0.4 : e.speed;
            ctx.fillStyle = '#ff4444';
            ctx.beginPath(); ctx.moveTo(e.x, e.y+10); ctx.lineTo(e.x-12, e.y-12); ctx.lineTo(e.x+12, e.y-12); ctx.fill();

            // Collision with bullets
            player.bullets.forEach((b, bi) => {
                if (Math.hypot(e.x-b.x, e.y-b.y) < 20) {
                    enemies.splice(ei, 1); player.bullets.splice(bi, 1);
                    score += 10;
                    Sound.play(150, 'sawtooth', 0.2, 0.05);
                    if (score % 200 === 0) wave++;
                }
            });

            // Collision with player
            if (!isGodMode && Math.hypot(e.x-player.x, e.y-player.y) < 20) {
                enemies.splice(ei, 1); lives--;
                Sound.play(60, 'sine', 0.4, 0.2);
                if (lives <= 0) { gameState = 'gameOver'; handleScore(score); }
            }
            if(e.y > canvas.height + 20) enemies.splice(ei, 1);
        });

        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('waveDisplay').textContent = wave;
        document.getElementById('livesDisplay').textContent = "❤️".repeat(Math.max(0, lives));

        requestAnimationFrame(update);
    }
  </script>
 </body>
</html>
