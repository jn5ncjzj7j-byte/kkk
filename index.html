<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bullet Storm - Admin Edition</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&display=swap');
        * { font-family: 'Noto Sans Thai', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body { overflow: hidden; background: #0a0a0f; margin: 0; box-sizing: border-box; }
        #gameCanvas { display: block; touch-action: none; }
        .glow-text { text-shadow: 0 0 10px #ff6b9d, 0 0 20px #ff6b9d; }
        .glow-blue { text-shadow: 0 0 10px #6bffff, 0 0 20px #6bffff; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-anim { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float-anim { animation: float 3s ease-in-out infinite; }
        .control-hint { background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="h-full">

    <div id="startScreen" class="fixed inset-0 flex flex-col items-center justify-center z-20" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 50%, #0a1a2a 100%);">
        <div class="text-center w-full flex flex-col items-center justify-center px-4">
            <h1 class="text-5xl md:text-7xl font-black text-pink-400 glow-text mb-4 float-anim">✧ BULLET STORM ✧</h1>
            <p class="text-cyan-300 text-lg md:text-xl mb-12 glow-blue">弾幕シューティング</p>
            <div class="control-hint rounded-xl p-6 mb-8 max-w-md w-full">
                <p class="text-white font-bold mb-4 text-lg">🎮 วิธีเล่น</p>
                <div class="text-gray-300 text-sm space-y-3 text-left">
                    <p>💻 <span class="text-cyan-400 font-bold">WASD</span> - เคลื่อนที่ | <span class="text-pink-400 font-bold">SHIFT</span> - โหมดช้า</p>
                    <p>📱 <span class="text-cyan-400 font-bold">ลากนิ้ว</span> - เคลื่อนที่ | <span class="text-pink-400 font-bold">2 นิ้ว</span> - โหมดช้า</p>
                    <p>🛠️ <span class="text-yellow-400 font-bold">Right Ctrl</span> - เปิด Admin Panel</p>
                </div>
            </div>
            <button id="startBtn" class="px-12 py-4 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold text-xl rounded-full transform hover:scale-105 transition-all shadow-lg shadow-pink-500/50 pulse-anim"> 🚀 เริ่มเกม </button>
        </div>
    </div>

    <div id="leaderboardScreen" class="absolute inset-0 hidden flex-col items-center justify-center z-30" style="background: rgba(10,10,20,0.98);">
        <h2 class="text-4xl font-black text-cyan-400 glow-blue mb-6">TOP PILOTS</h2>
        <div id="leaderboardList" class="w-full max-w-xs space-y-2 mb-8"></div>
        <button onclick="location.reload()" class="px-10 py-3 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold text-lg rounded-full transform hover:scale-105 transition-all"> 🔄 เล่นอีกครั้ง </button>
    </div>

    <div id="adminPanel" class="fixed top-10 left-10 w-64 hidden flex-col z-50 bg-gray-900 border-2 border-pink-500 rounded-lg shadow-2xl overflow-hidden">
        <div id="adminHeader" class="bg-pink-600 p-2 text-white font-bold cursor-move flex justify-between items-center text-[10px]">
            <span>🛠️ ADMIN CONSOLE</span>
            <span class="opacity-70">DRAG</span>
        </div>
        <div class="p-4 space-y-4 bg-gray-900/95">
            <div>
                <label class="text-pink-400 text-[10px] block mb-1 uppercase">Set Lives</label>
                <input type="number" id="adminLives" class="w-full bg-black text-white p-1 rounded border border-gray-700" value="3">
            </div>
            <div>
                <label class="text-cyan-400 text-[10px] block mb-1 uppercase">Set Power %</label>
                <input type="number" id="adminPower" class="w-full bg-black text-white p-1 rounded border border-gray-700" value="0">
            </div>
            <button id="invincBtn" class="w-full py-2 bg-red-900 text-white rounded text-xs font-bold transition-colors">GOD MODE: OFF</button>
            <button onclick="localStorage.clear(); location.reload();" class="w-full py-1 text-gray-500 text-[10px] hover:text-red-400">WIPE ALL SAVES</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="hud" class="absolute top-0 left-0 right-0 p-3 hidden z-10 pointer-events-none">
        <div class="flex justify-between items-start max-w-2xl mx-auto">
            <div class="control-hint rounded-lg px-4 py-2"><p class="text-pink-400 font-bold text-[10px]">SCORE</p><p id="scoreDisplay" class="text-white text-xl font-bold">0</p></div>
            <div class="control-hint rounded-lg px-4 py-2 text-center"><p class="text-cyan-400 font-bold text-[10px]">WAVE</p><p id="waveDisplay" class="text-white text-xl font-bold">1</p></div>
            <div class="control-hint rounded-lg px-4 py-2"><p class="text-red-400 font-bold text-[10px]">LIVES</p><p id="livesDisplay" class="text-white text-xl font-bold">❤️❤️❤️</p></div>
        </div>
        <div id="slowModeBar" class="max-w-2xl mx-auto mt-2 hidden opacity-0 transition-opacity">
            <div class="control-hint rounded-lg px-3 py-1 flex items-center gap-2">
                <span class="text-blue-400 text-[10px] font-bold">SLOW</span>
                <div class="flex-1 h-1.5 bg-gray-700 rounded-full overflow-hidden">
                    <div id="slowModeTimer" class="h-full bg-cyan-400" style="width: 100%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND MANAGER ---
        const Sound = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(freq, type, duration, vol, rampTo = 10) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(rampTo, this.ctx.currentTime + duration);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
        };

        // --- GAME CORE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameState = 'menu';
        let score = 0, lives = 3, wave = 1, power = 0, slowModeActive = false, slowModeTimer = 5000;
        let isGodMode = false;

        const player = { x: 0, y: 0, vx: 0, vy: 0, radius: 12, hitbox: 3, speed: 8, bullets: [], lastFire: 0 };
        let enemies = [], enemyBullets = [], particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        // --- ADMIN & DRAG ---
        const adminPanel = document.getElementById('adminPanel');
        const adminHeader = document.getElementById('adminHeader');
        let dragging = false, offset = { x: 0, y: 0 };
        adminHeader.onmousedown = (e) => { dragging = true; offset.x = e.clientX - adminPanel.offsetLeft; offset.y = e.clientY - adminPanel.offsetTop; };
        document.onmousemove = (e) => { if (dragging) { adminPanel.style.left = (e.clientX - offset.x) + 'px'; adminPanel.style.top = (e.clientY - offset.y) + 'px'; } };
        document.onmouseup = () => dragging = false;
        document.addEventListener('keydown', (e) => { if (e.code === 'ControlRight') adminPanel.classList.toggle('hidden'); });
        
        document.getElementById('invincBtn').onclick = function() {
            isGodMode = !isGodMode;
            this.textContent = isGodMode ? "GOD MODE: ON" : "GOD MODE: OFF";
            this.classList.toggle('bg-green-600'); this.classList.toggle('bg-red-900');
        };
        document.getElementById('adminLives').onchange = (e) => { lives = parseInt(e.target.value); updateHUD(); };
        document.getElementById('adminPower').onchange = (e) => { power = parseInt(e.target.value); };

        // --- LEADERBOARD & SAVE ---
        function saveScore() {
            let name = localStorage.getItem('bs_name');
            if (!name) { name = prompt("ชื่อของคุณ:", "PILOT") || "Unknown"; localStorage.setItem('bs_name', name); }
            let scores = JSON.parse(localStorage.getItem('bs_scores')) || [];
            scores.push({ name, score });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('bs_scores', JSON.stringify(scores.slice(0, 5)));
            showLeaderboard();
        }

        function showLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('bs_scores')) || [];
            document.getElementById('leaderboardList').innerHTML = scores.map((s, i) => `
                <div class="flex justify-between bg-gray-800 p-2 rounded border-l-4 border-cyan-400">
                    <span class="text-white font-bold">${i+1}. ${s.name}</span>
                    <span class="text-cyan-400">${s.score.toLocaleString()}</span>
                </div>
            `).join('');
            document.getElementById('leaderboardScreen').classList.remove('hidden');
        }

        // --- INPUT ---
        const keys = {};
        window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key === 'Shift') slowModeActive = true; };
        window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; if(e.key === 'Shift') slowModeActive = false; };

        // --- LOOP ---
        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('waveDisplay').textContent = wave;
            document.getElementById('livesDisplay').textContent = "❤️".repeat(Math.max(0, lives));
            document.getElementById('slowModeBar').style.opacity = slowModeActive ? "1" : "0";
            document.getElementById('slowModeTimer').style.width = (slowModeTimer / 5000 * 100) + "%";
        }

        function spawnEnemy() {
            if (gameState !== 'playing') return;
            enemies.push({ x: Math.random() * canvas.width, y: -20, hp: 1 + Math.floor(wave/2), speed: 2 + (Math.random() * wave * 0.2) });
            setTimeout(spawnEnemy, Math.max(200, 1500 - (wave * 100)));
        }

        function loop() {
            if (gameState !== 'playing') return;
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Slow Mo Logic
            if (slowModeActive && slowModeTimer > 0) {
                slowModeTimer -= 16;
            } else {
                slowModeActive = false;
                if (slowModeTimer < 5000) slowModeTimer += 4;
            }

            const currentSpeed = slowModeActive ? player.speed * 0.5 : player.speed;

            // Player Physics
            if (keys['w']) player.vy -= 1;
            if (keys['s']) player.vy += 1;
            if (keys['a']) player.vx -= 1;
            if (keys['d']) player.vx += 1;
            
            player.vx *= 0.85; player.vy *= 0.85;
            player.x += player.vx * (currentSpeed/8);
            player.y += player.vy * (currentSpeed/8);

            // Boundary
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Draw Player
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff6b9d';
            ctx.fillStyle = '#ff6b9d';
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // Fire
            if (Date.now() - player.lastFire > 100) {
                player.bullets.push({ x: player.x, y: player.y - 10 });
                Sound.play(600, 'square', 0.05, 0.02, 300);
                player.lastFire = Date.now();
            }

            // Update Bullets
            player.bullets.forEach((b, i) => {
                b.y -= 12;
                ctx.fillStyle = '#6bffff';
                ctx.fillRect(b.x - 2, b.y, 4, 12);
                if (b.y < -20) player.bullets.splice(i, 1);
            });

            // Update Enemies
            enemies.forEach((e, ei) => {
                e.y += slowModeActive ? e.speed * 0.3 : e.speed;
                ctx.fillStyle = '#ff4444';
                ctx.beginPath(); ctx.moveTo(e.x, e.y + 10); ctx.lineTo(e.x - 12, e.y - 12); ctx.lineTo(e.x + 12, e.y - 12); ctx.fill();

                // Bullet Collision
                player.bullets.forEach((b, bi) => {
                    if (Math.hypot(e.x - b.x, e.y - b.y) < 20) {
                        e.hp--;
                        player.bullets.splice(bi, 1);
                        if (e.hp <= 0) {
                            enemies.splice(ei, 1);
                            score += 10 * wave;
                            Sound.play(100, 'sawtooth', 0.1, 0.05);
                            if (score % 500 === 0) { wave++; updateHUD(); }
                        }
                    }
                });

                // Player Collision
                if (!isGodMode && Math.hypot(e.x - player.x, e.y - player.y) < 20) {
                    enemies.splice(ei, 1);
                    lives--;
                    updateHUD();
                    Sound.play(60, 'sine', 0.4, 0.2);
                    if (lives <= 0) { gameState = 'gameOver'; saveScore(); }
                }

                if (e.y > canvas.height + 20) enemies.splice(ei, 1);
            });

            updateHUD();
            requestAnimationFrame(loop);
        }

        document.getElementById('startBtn').onclick = () => {
            Sound.init();
            gameState = 'playing';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            player.x = canvas.width / 2; player.y = canvas.height * 0.8;
            spawnEnemy();
            loop();
        };
    </script>
</body>
</html>
