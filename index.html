<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 IPA SHIT INSTALLER v5 - RANDOM BUNDLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: system-ui; } .glow { text-shadow: 0 0 40px #ff00ff; } </style>
</head>
<body class="bg-black text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-8">
        <h1 class="text-6xl font-black text-center mb-2 glow">🍎 IPA SHIT INSTALLER v5</h1>
        <p class="text-center text-pink-500 text-3xl mb-6">RANDOM BUNDLE MODE - ทุกแอพไม่เว้น Delta X</p>

        <div class="bg-zinc-900 rounded-3xl p-8">
            <button onclick="randomEverything()" 
                    class="w-full mb-10 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-3xl font-black py-7 rounded-2xl">
                🔥 RANDOM BUNDLE + NAME + EVERYTHING (กดอันนี้เลย!)
            </button>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">📱 ชื่อแอพ</label>
                    <input id="name" type="text" placeholder="Delta X หรืออะไรก็ได้" class="w-full bg-zinc-800 border border-pink-500 rounded-xl px-5 py-4 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">🔑 Bundle ID (สุ่มอัตโนมัติ)</label>
                    <div class="flex gap-3">
                        <input id="bundle" type="text" class="flex-1 bg-zinc-800 border border-pink-500 rounded-xl px-5 py-4 text-lg">
                        <button onclick="generateRandomBundle()" class="bg-purple-600 hover:bg-purple-700 px-8 rounded-xl font-bold text-xl">🔀 สุ่มใหม่</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">📦 เวอร์ชั่น</label>
                    <input id="version" type="text" value="1.0" class="w-full bg-zinc-800 border border-pink-500 rounded-xl px-5 py-4 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">🔗 ลิงก์ IPA (Direct)</label>
                    <input id="ipaurl" type="text" placeholder="https://yourlink.com/app.ipa" class="w-full bg-zinc-800 border border-pink-500 rounded-xl px-5 py-4 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">🖼️ ลิงก์ไอคอน (512x512 PNG)</label>
                    <input id="iconurl" type="text" placeholder="https://yourlink.com/icon.png" class="w-full bg-zinc-800 border border-pink-500 rounded-xl px-5 py-4 text-lg">
                </div>
            </div>

            <button onclick="generateManifest()" 
                    class="mt-10 w-full bg-gradient-to-r from-pink-500 to-purple-600 text-3xl font-black py-7 rounded-2xl">
                🔥 GENERATE MANIFEST + ดาวน์โหลดเลย 🔥
            </button>
        </div>

        <div id="result" class="mt-8 hidden bg-zinc-900 rounded-3xl p-6"></div>

        <div class="mt-12 bg-yellow-950 border border-yellow-600 rounded-3xl p-6 text-sm">
            <p class="text-yellow-400 font-bold">⚠️ เตือนก่อนใช้ random:</p>
            <p class="text-gray-400">• สำหรับ Delta X ปกติ ต้องใช้ bundle เดิม (com.deltax.emulator) ถึงจะลงได้<br>
            • Random ใช้ได้ดีกับ IPA ที่ resignable หรือแอพที่กูทำเอง<br>
            • ถ้า error เดิม ให้ล้าง iPhone Storage + Reset All Settings ก่อน</p>
        </div>
    </div>

    <script>
        function generateRandomBundle() {
            const rand = Math.random().toString(36).substring(2, 12);
            const name = document.getElementById('name').value.toLowerCase().replace(/[^a-z0-9]/g, '') || 'app';
            const bundle = `com.${rand}.${name}`;
            document.getElementById('bundle').value = bundle;
        }

        function randomEverything() {
            const apps = ["Delta X", "Spotify", "GTA", "Minecraft", "Roblox", "FreeFire", "MyApp"];
            const randomName = apps[Math.floor(Math.random() * apps.length)];
            document.getElementById('name').value = randomName;
            generateRandomBundle();
        }

        function generateManifest() {
            const name = document.getElementById('name').value || 'My App';
            const bundle = document.getElementById('bundle').value || `com.random${Math.random().toString(36).substring(2,10)}.app`;
            const version = document.getElementById('version').value || '1.0';
            const ipaurl = document.getElementById('ipaurl').value;
            const iconurl = document.getElementById('iconurl').value || '';

            if (!ipaurl) { alert('ใส่ลิงก์ IPA ก่อนไอ้สัส!'); return; }

            let assets = `<dict><key>kind</key><string>software-package</string><key>url</key><string>${ipaurl}</string></dict>`;
            if (iconurl) assets += `<dict><key>kind</key><string>display-image</string><key>needs-shine</key><false/><key>url</key><string>${iconurl}</string></dict>`;

            const plist = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>items</key>
    <array>
        <dict>
            <key>assets</key><array>${assets}</array>
            <key>metadata</key>
            <dict>
                <key>bundle-identifier</key><string>${bundle}</string>
                <key>bundle-version</key><string>${version}</string>
                <key>kind</key><string>software</string>
                <key>title</key><string>${name}</string>
            </dict>
        </dict>
    </array>
</dict>
</plist>`;

            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <p class="text-green-400 font-black text-2xl mb-3">✅ Manifest v5 พร้อม! Bundle สุ่มใหม่แล้ว</p>
                <textarea class="w-full h-72 bg-black text-green-300 p-5 rounded-xl font-mono text-sm">${plist}</textarea>
                <p class="mt-6 text-pink-400">ดาวน์โหลด manifest อัตโนมัติแล้ว</p>
            `;

            const blob = new Blob([plist], { type: 'text/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name.replace(/[^a-zA-Z0-9]/g, '_') + '_random_manifest.plist';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // เปิดเว็บครั้งแรกสุ่มให้เลย
        window.onload = () => {
            randomEverything();
        };
    </script>
</body>
</html>
