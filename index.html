<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bullet Storm</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&display=swap');
    
    * {
      font-family: 'Noto Sans Thai', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
    }
    
    body {
      overflow: hidden;
      background: #0a0a0f;
    }
    
    #gameCanvas {
      display: block;
      touch-action: none;
    }
    
    .glow-text {
      text-shadow: 0 0 10px #ff6b9d, 0 0 20px #ff6b9d, 0 0 30px #ff6b9d;
    }
    
    .glow-blue {
      text-shadow: 0 0 10px #6bffff, 0 0 20px #6bffff;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .pulse-anim {
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .float-anim {
      animation: float 3s ease-in-out infinite;
    }
    
    .control-hint {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full m-0 p-0">
  <!-- Start Screen -->
  <div id="startScreen" class="fixed inset-0 flex flex-col items-center justify-center z-20" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 50%, #0a1a2a 100%);">
   <div class="text-center w-full flex flex-col items-center justify-center px-4">
    <h1 id="gameTitle" class="text-5xl md:text-7xl font-black text-pink-400 glow-text mb-4 float-anim">✧ BULLET STORM ✧</h1>
    <p class="text-cyan-300 text-lg md:text-xl mb-12 glow-blue">弾幕シューティング</p>
    <div class="control-hint rounded-xl p-6 mb-8 max-w-md w-full">
     <p class="text-white font-bold mb-4 text-lg">🎮 วิธีเล่น</p>
     <div class="text-gray-300 text-sm space-y-3">
      <p>💻 <span class="text-cyan-400">WASD</span> - เคลื่อนที่</p>
      <p><span class="text-pink-400">SHIFT</span> - โหมดช้า</p>
      <p>📱 <span class="text-cyan-400">ลากนิ้ว</span> - เคลื่อนที่</p>
      <p><span class="text-pink-400">2 นิ้ว</span> - โหมดช้า</p>
      <p class="text-yellow-300 mt-4 pt-2 border-t border-gray-600">⚡ หลบกระสุนและเก็บพลัง!</p>
     </div>
    </div><button id="startBtn" class="px-12 py-4 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-400 hover:to-purple-500 text-white font-bold text-xl rounded-full transform hover:scale-105 transition-all duration-300 shadow-lg shadow-pink-500/50 pulse-anim"> 🚀 เริ่มเกม </button>
    <p class="text-gray-500 text-sm mt-6">กดปุ่มเพื่อเริ่ม</p>
   </div><!-- Floating particles -->
   <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute w-2 h-2 bg-pink-400 rounded-full opacity-50" style="top: 20%; left: 10%; animation: float 4s ease-in-out infinite;"></div>
    <div class="absolute w-3 h-3 bg-cyan-400 rounded-full opacity-40" style="top: 60%; left: 80%; animation: float 5s ease-in-out infinite 1s;"></div>
    <div class="absolute w-2 h-2 bg-purple-400 rounded-full opacity-60" style="top: 80%; left: 30%; animation: float 3.5s ease-in-out infinite 0.5s;"></div>
    <div class="absolute w-4 h-4 bg-yellow-400 rounded-full opacity-30" style="top: 30%; left: 70%; animation: float 4.5s ease-in-out infinite 1.5s;"></div>
   </div>
  </div><!-- Game Over Screen -->
  <div id="gameOverScreen" class="absolute inset-0 hidden flex-col items-center justify-center z-20" style="background: rgba(10,10,20,0.95);">
   <h1 class="text-4xl md:text-6xl font-black text-red-500 glow-text mb-4">GAME OVER</h1>
   <p class="text-white text-xl mb-2">สกอร์: <span id="finalScore" class="text-yellow-400 font-bold">0</span></p>
   <p class="text-gray-400 mb-8">เวฟสูงสุด: <span id="finalWave" class="text-cyan-400">1</span></p><button id="restartBtn" class="px-10 py-3 bg-gradient-to-r from-red-500 to-orange-600 hover:from-red-400 hover:to-orange-500 text-white font-bold text-lg rounded-full transform hover:scale-105 transition-all"> 🔄 เล่นอีกครั้ง </button>
  </div><!-- Game Canvas -->
  <canvas id="gameCanvas" class="absolute inset-0"></canvas><!-- HUD -->
  <div id="hud" class="absolute top-0 left-0 right-0 p-3 hidden z-10">
   <div class="flex justify-between items-start max-w-2xl mx-auto">
    <div class="control-hint rounded-lg px-4 py-2">
     <p class="text-pink-400 font-bold text-sm">SCORE</p>
     <p id="scoreDisplay" class="text-white text-xl font-bold">0</p>
    </div>
    <div class="control-hint rounded-lg px-4 py-2 text-center">
     <p class="text-cyan-400 font-bold text-sm">WAVE</p>
     <p id="waveDisplay" class="text-white text-xl font-bold">1</p>
    </div>
    <div class="control-hint rounded-lg px-4 py-2">
     <p class="text-red-400 font-bold text-sm">LIVES</p>
     <p id="livesDisplay" class="text-white text-xl font-bold">❤️❤️❤️</p>
    </div>
   </div><!-- Slow Mode Timer -->
   <div id="slowModeBar" class="max-w-2xl mx-auto mt-2 hidden">
    <div class="control-hint rounded-lg px-3 py-1">
     <div class="flex items-center gap-2">
      <span class="text-blue-400 text-xs font-bold">SLOW</span>
      <div class="flex-1 h-2 bg-gray-700 rounded-full overflow-hidden">
       <div id="slowModeTimer" class="h-full bg-gradient-to-r from-blue-400 to-cyan-400 transition-all duration-100" style="width: 100%"></div>
      </div><span id="slowModeText" class="text-blue-400 text-xs font-bold">5.0s</span>
     </div>
    </div>
   </div><!-- Power bar -->
   <div class="max-w-2xl mx-auto mt-2">
    <div class="control-hint rounded-lg px-3 py-1">
     <div class="flex items-center gap-2">
      <span class="text-yellow-400 text-xs font-bold">POWER</span>
      <div class="flex-1 h-2 bg-gray-700 rounded-full overflow-hidden">
       <div id="powerBar" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500 transition-all duration-300" style="width: 0%"></div>
      </div><span id="powerText" class="text-yellow-400 text-xs font-bold">0%</span>
     </div>
    </div>
   </div>
  </div><!-- Mobile Controls Hint -->
  <div id="mobileHint" class="absolute bottom-4 left-0 right-0 text-center hidden z-10 pointer-events-none">
   <p class="text-gray-400 text-sm">ลากนิ้วเพื่อเคลื่อนที่ • 2 นิ้วเพื่อโหมดช้า</p>
  </div>
  <script>
    // Default config
    const defaultConfig = {
      game_title: 'BULLET STORM',
      primary_color: '#ff6b9d',
      secondary_color: '#0a0a1a',
      text_color: '#ffffff',
      accent_color: '#6bffff',
      font_family: 'Noto Sans Thai'
    };

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const title = document.getElementById('gameTitle');
          if (title) {
            title.textContent = `✧ ${config.game_title || defaultConfig.game_title} ✧`;
          }
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.primary_color || defaultConfig.primary_color,
              set: (v) => window.elementSdk.setConfig({ primary_color: v })
            },
            {
              get: () => config.secondary_color || defaultConfig.secondary_color,
              set: (v) => window.elementSdk.setConfig({ secondary_color: v })
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (v) => window.elementSdk.setConfig({ text_color: v })
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (v) => window.elementSdk.setConfig({ accent_color: v })
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (v) => window.elementSdk.setConfig({ font_family: v })
          },
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title]
        ])
      });
    }

    // Game variables
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let gameState = 'menu';
    let score = 0;
    let lives = 3;
    let wave = 1;
    let power = 0;
    let gameTime = 0;
    let slowMode = false;
    let slowModeActive = false;
    let slowModeTimer = 0;
    let slowModeMax = 5000;
    let slowModeCooldown = 0;
    
    // Player
    const player = {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      radius: 12,
      hitboxRadius: 3,
      speed: 8,
      slowSpeed: 4,
      acceleration: 1.2,
      friction: 0.85,
      color: '#ff6b9d',
      invincible: false,
      invincibleTime: 0,
      bullets: [],
      fireRate: 100,
      lastFire: 0
    };
    
    // Enemies and bullets
    let enemies = [];
    let enemyBullets = [];
    let powerUps = [];
    let particles = [];
    
    // Input
    const keys = { w: false, a: false, s: false, d: false, shift: false };
    let touchStart = null;
    let touchCurrent = null;
    let isTouching = false;
    let touchCount = 0;
    
    // Resize canvas
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (gameState === 'menu') {
        player.x = canvas.width / 2;
        player.y = canvas.height * 0.8;
      }
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
